name: Docker Publish

# Publish on v* tag push (or manual dispatch). Do not also trigger on
# release: published — Release Tag on Merge creates a GitHub Release after the
# tag, which would double-build images if both triggers were enabled.

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v1.0, v1.1.2, etc.
  workflow_dispatch: # Allow manual triggering
    inputs:
      tag:
        description: "Version tag to release (e.g., v1.0.0)"
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read # Needed to checkout the repository
      packages: write # Needed for GitHub Container Registry (optional)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Fetches all history and tags, useful if script falls back to git describe

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        # Keep defaults — custom buildkit image + network=host previously caused opaque failures.
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create production .env file for backend
        run: |
          set -euo pipefail
          if [[ -f backend/.env.example ]]; then
            cp backend/.env.example backend/.env.production
          elif [[ -f backend/production.env.example ]]; then
            cp backend/production.env.example backend/.env.production
          else
            echo "::error::No backend/.env.example or backend/production.env.example found"
            exit 1
          fi
        shell: bash

      - name: Set IMAGE_TAG and metadata
        id: meta
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IMAGE_TAG="${{ github.event.inputs.tag }}"
            echo "Using manual workflow_dispatch tag: ${IMAGE_TAG}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            IMAGE_TAG="${{ github.ref_name }}"
            echo "Using Git tag as IMAGE_TAG: ${IMAGE_TAG}"
          else
            echo "::error::Unsupported event '${{ github.event_name }}'. Trigger via v* tag push or workflow_dispatch."
            exit 1
          fi

          if [[ -z "${IMAGE_TAG}" ]]; then
            echo "::error::IMAGE_TAG resolved empty. Refusing to push untagged images."
            exit 1
          fi

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "VERSION=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "VCS_REF=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
        shell: bash

      - name: Validate Dockerfiles and Hub README paths
        run: |
          set -euo pipefail
          missing=0
          for path in \
            backend/Dockerfile.prod \
            backend/queue.dockerfile.prod \
            react-frontend/Dockerfile.prod \
            backend/README.dockerhub.md \
            react-frontend/README.dockerhub.md \
            backend/README.worker.dockerhub.md
          do
            if [[ ! -f "${path}" ]]; then
              echo "::error::Missing required file: ${path}"
              missing=1
            fi
          done

          # Guard against the Dec 2025 regression: worker is a separate Dockerfile,
          # not a multi-stage target on Dockerfile.prod.
          if grep -qE '^FROM .* AS worker$' backend/Dockerfile.prod; then
            echo "::warning::Dockerfile.prod unexpectedly defines an AS worker stage"
          fi
          if ! grep -qE '^FROM ' backend/queue.dockerfile.prod; then
            echo "::error::backend/queue.dockerfile.prod has no FROM instructions"
            missing=1
          fi

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

          echo "IMAGE_TAG=${IMAGE_TAG}"
          echo "Validation OK"
        shell: bash

      - name: Build and push backend image (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-backend:latest
          labels: |
            org.opencontainers.image.title=FastAPI RBAC Backend
            org.opencontainers.image.description=Backend service for FastAPI RBAC project
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.created=${{ env.BUILD_DATE }}
            org.opencontainers.image.revision=${{ env.VCS_REF }}
            org.opencontainers.image.source=https://github.com/mnaimfaizy/fastapi_rbac
            org.opencontainers.image.url=https://github.com/mnaimfaizy/fastapi_rbac
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-backend:buildcache,mode=max
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            VCS_REF=${{ env.VCS_REF }}
            VERSION=${{ env.VERSION }}

      - name: Build and push frontend image (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: ./react-frontend
          file: ./react-frontend/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-frontend:latest
          labels: |
            org.opencontainers.image.title=FastAPI RBAC Frontend
            org.opencontainers.image.description=React frontend for FastAPI RBAC project
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.created=${{ env.BUILD_DATE }}
            org.opencontainers.image.revision=${{ env.VCS_REF }}
            org.opencontainers.image.source=https://github.com/mnaimfaizy/fastapi_rbac
            org.opencontainers.image.url=https://github.com/mnaimfaizy/fastapi_rbac
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-frontend:buildcache,mode=max
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            VCS_REF=${{ env.VCS_REF }}
            VERSION=${{ env.VERSION }}

      - name: Build and push worker image (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          # Worker/beat/flower use the dedicated queue image, matching docker-compose.prod.yml
          file: ./backend/queue.dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-worker:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-worker:latest
          labels: |
            org.opencontainers.image.title=FastAPI RBAC Worker
            org.opencontainers.image.description=Celery worker for FastAPI RBAC project
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.created=${{ env.BUILD_DATE }}
            org.opencontainers.image.revision=${{ env.VCS_REF }}
            org.opencontainers.image.source=https://github.com/mnaimfaizy/fastapi_rbac
            org.opencontainers.image.url=https://github.com/mnaimfaizy/fastapi_rbac
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-worker:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-worker:buildcache,mode=max
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            VCS_REF=${{ env.VCS_REF }}
            VERSION=${{ env.VERSION }}

      - name: Update Docker Hub Description for Backend
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-backend
          readme-filepath: ./backend/README.dockerhub.md
          short-description: "Backend service for FastAPI RBAC project."

      - name: Update Docker Hub Description for Frontend
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-frontend
          readme-filepath: ./react-frontend/README.dockerhub.md
          short-description: "React frontend for FastAPI RBAC project."

      - name: Update Docker Hub Description for Worker
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-worker
          readme-filepath: ./backend/README.worker.dockerhub.md
          short-description: "Celery worker for FastAPI RBAC project."

      - name: Create release summary
        if: success()
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "**Version:** ${{ env.IMAGE_TAG }}"
            echo "**Commit:** ${{ env.VCS_REF }}"
            echo "**Build Date:** ${{ env.BUILD_DATE }}"
            echo ""
            echo "### Published Images"
            echo ""
            echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-backend:${{ env.IMAGE_TAG }}\`"
            echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-frontend:${{ env.IMAGE_TAG }}\`"
            echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/fastapi-rbac-worker:${{ env.IMAGE_TAG }}\`"
            echo ""
            echo "### Architecture Support"
            echo ""
            echo "- linux/amd64"
            echo "- linux/arm64"
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Notify on failure
        if: failure()
        run: |
          {
            echo "## Release Failed"
            echo ""
            echo "The Docker image build and push process failed."
            echo ""
            echo "### Troubleshooting"
            echo ""
            echo "1. Check which step failed above (validation, login, backend/frontend/worker build, or Hub description)."
            echo "2. Worker must build from \`backend/queue.dockerfile.prod\` (not \`Dockerfile.prod --target worker\`)."
            echo "3. Verify \`DOCKERHUB_USERNAME\` / \`DOCKERHUB_TOKEN\` secrets."
            echo "4. Confirm \`IMAGE_TAG\` was set (\`v*\` tag push or workflow_dispatch input)."
            echo "5. Re-run via Actions → Docker Publish → Run workflow after fixing."
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash
